services:
  # ── Backend: Node.js API ─────────────────────────────────────────────────────
  - type: web
    name: ipexchange-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://ipexchange.onrender.com

  # ── Frontend: Static Site (React/Vite) ──────────────────────────────────────
  - type: web
    name: ipexchange
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ipexchange-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
