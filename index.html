    <!-- Polyfills for Node.js globals required by wallet/crypto libraries (Privy, viem, etc.)
         This MUST be a regular <script>, not type="module", so it runs synchronously
         before any ES module is parsed. -->
    <script>
      window.global = window.global ?? globalThis;
      window.process = window.process ?? { env: {}, version: '', versions: {} };
      window.Buffer = window.Buffer ?? { isBuffer: () => false };
    </script>
