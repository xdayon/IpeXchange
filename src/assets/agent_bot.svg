<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#glow)" stroke-width="2" stroke-dasharray="20 10" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite" />
  </circle>

  <!-- Robot Head Base -->
  <path d="M120 180 Q120 100 200 100 Q280 100 280 180 L280 280 Q280 320 200 320 Q120 320 120 280 Z" fill="rgba(15,23,42,0.8)" stroke="url(#glow)" stroke-width="4" filter="url(#neon)" />
  
  <!-- Eyes Visor -->
  <rect x="140" y="160" width="120" height="40" rx="20" fill="rgba(56,189,248,0.1)" stroke="url(#glow)" stroke-width="2" />
  
  <!-- Glowing Eyes -->
  <circle cx="170" cy="180" r="8" fill="#B4F44A" filter="url(#neon)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="230" cy="180" r="8" fill="#B4F44A" filter="url(#neon)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Circuit Lines -->
  <path d="M200 100 L200 60 M200 320 L200 360" stroke="url(#glow)" stroke-width="2" opacity="0.5" />
  <path d="M280 200 L320 200 M120 200 L80 200" stroke="url(#glow)" stroke-width="2" opacity="0.5" />
</svg>
